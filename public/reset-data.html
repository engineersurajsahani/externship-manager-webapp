<!DOCTYPE html>
<html>
<head>
    <title>Reset Dashboard Data</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
            max-width: 800px;
            margin: 0 auto;
        }
        button {
            padding: 10px 20px;
            margin: 10px;
            font-size: 16px;
            cursor: pointer;
            background: #4f46e5;
            color: white;
            border: none;
            border-radius: 4px;
        }
        button:hover {
            background: #4338ca;
        }
        .output {
            background: #f3f4f6;
            padding: 15px;
            margin-top: 20px;
            border-radius: 4px;
            white-space: pre-wrap;
        }
    </style>
</head>
<body>
    <h1>Reset Dashboard Data</h1>
    <p>Use this page to reset localStorage data and test the dashboard with fresh data.</p>
    
    <div>
        <button onclick="clearAllData()">Clear All Data</button>
        <button onclick="clearProjectData()">Clear Projects Only</button>
        <button onclick="showCurrentData()">Show Current Data</button>
        <button onclick="window.location.href='/'">Go to Dashboard</button>
    </div>
    
    <div class="output" id="output"></div>
    
    <script>
        function clearAllData() {
            localStorage.removeItem('projects');
            localStorage.removeItem('users');
            localStorage.removeItem('dailyUpdates');
            document.getElementById('output').innerText = 'All data cleared! Refresh the dashboard to see new data.';
        }
        
        function clearProjectData() {
            localStorage.removeItem('projects');
            localStorage.removeItem('users');
            document.getElementById('output').innerText = 'Projects and users cleared! Refresh the dashboard to see new data.';
        }
        
        function showCurrentData() {
            const output = document.getElementById('output');
            const projects = JSON.parse(localStorage.getItem('projects') || '[]');
            const users = JSON.parse(localStorage.getItem('users') || '[]');
            const currentUser = localStorage.getItem('userEmail');
            
            let text = `Current User: ${currentUser}\n\n`;
            text += `Projects (${projects.length}):\n`;
            projects.forEach(p => {
                text += `  - ${p.name} (PM: ${p.projectManager?.email || p.lead}, Team: ${p.teamMembers?.length || 0} members)\n`;
            });
            
            text += `\nUsers (${users.length}):\n`;
            users.forEach(u => {
                text += `  - ${u.name} (${u.email}) - Role: ${u.role}\n`;
            });
            
            output.innerText = text;
        }
        
        // Show current data on load
        showCurrentData();
    </script>
</body>
</html>
